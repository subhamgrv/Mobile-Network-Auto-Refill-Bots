name: Lidl Bot

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch:

jobs:
  run-lidl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install system deps (Chromium + Chromedriver)
        run: |
          sudo apt-get update
          # Install chromium and chromedriver (works on ubuntu-latest)
          sudo apt-get install -y chromium-browser chromium-chromedriver \
            fonts-liberation libappindicator3-1 libasound2
          # expose paths to subsequent steps via GITHUB_ENV
          echo "CHROME_BINARY=$(which chromium-browser || which chromium || true)" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=$(which chromedriver || true)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Selenium script
        env:
          LIDL_USERNAME: ${{ secrets.LIDL_USERNAME }}
          LIDL_PASSWORD: ${{ secrets.LIDL_PASSWORD }}
          # ensure HEADLESS true in CI
          HEADLESS: "true"
          # CHROME_BINARY and CHROMEDRIVER_PATH are set above into $GITHUB_ENV
        run: python lidl.py
