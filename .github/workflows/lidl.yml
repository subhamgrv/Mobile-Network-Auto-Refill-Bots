name: Lidl Bot

on:
  schedule:
       - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-lidl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system deps and Google Chrome
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y wget curl gnupg ca-certificates fonts-liberation \
            libappindicator3-1 libnss3 libxss1

          if ! command -v google-chrome-stable >/dev/null 2>&1; then
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
              | gpg --dearmor \
              | sudo tee /usr/share/keyrings/google-linux-signing-keyring.gpg >/dev/null
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
              | sudo tee /etc/apt/sources.list.d/google-chrome.list >/dev/null
            sudo apt-get update -y
            sudo apt-get install -y google-chrome-stable
          fi

          CHROME_BIN=$(which google-chrome-stable || which chromium-browser || which chromium || true)
          echo "CHROME_BINARY=$CHROME_BIN" >> $GITHUB_ENV
          "$CHROME_BIN" --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Selenium script
        env:
          LIDL_USERNAME: ${{ secrets.LIDL_USERNAME }}
          LIDL_PASSWORD: ${{ secrets.LIDL_PASSWORD }}
          LIDL_LOGIN_URL: "https://kundenkonto.lidl-connect.de/mein-lidl-connect.html"
          HEADLESS: "true"
          WAIT_SECS: "90"
        run: |
          set -x
          python lidl.py
          
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lidl-debug
          path: /tmp/lidl/
          if-no-files-found: ignore
