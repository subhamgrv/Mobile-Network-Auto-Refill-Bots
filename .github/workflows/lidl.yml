name: Lidl Bot

on:
  schedule:
    - cron: "*/13 * * * *"   # run every 5 minutes
  workflow_dispatch:         # allow manual run

jobs:
  run-lidl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Selenium script
        run: python lidl.py
        env:
          LIDL_USERNAME: ${{ secrets.LIDL_USERNAME }}
          LIDL_PASSWORD: ${{ secrets.LIDL_PASSWORD }}
